# Server settings
server:
  protocol: http
  http_addr: 0.0.0.0
  http_port: 3000
  domain: localhost

# Security settings (development configuration)
security:
  admin_user: admin
  admin_password: admin123
  secret_key: dbcostops_grafana_secret
  
# Database configuration
database:
  type: sqlite3
  path: /var/lib/grafana/grafana.db
  host: localhost
  port: 3306
  name: grafana
  user: grafana
  password: grafana

# Logging settings
log:
  mode: console
  level: info

# Disable analytics for development
analytics:
  reporting_enabled: false
  check_for_updates: false

# User management
users:
  allow_sign_up: false
  allow_org_create: false
  auto_assign_org: true
  auto_assign_org_role: Viewer
