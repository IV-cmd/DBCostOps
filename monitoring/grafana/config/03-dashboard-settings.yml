# Dashboard provisioning configuration
apiVersion: 1

providers:
  # DBCostOps dashboards from local files
  - name: 'dbcostops-dashboards'
    orgId: 1
    folder: 'DBCOSTOPS'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
