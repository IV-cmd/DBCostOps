# Logstash Input Configuration for DBCostOps
# Purpose: Define all input sources for log collection
# Author: DBCostOps Team
# Version: 2.0

input {
  # Filebeat input for structured logs
  beats {
    port => 5044
    add_field => { 
      "[@metadata][input_type]" => "beats"
    }
  }
  
  # TCP input for database metrics (PostgreSQL)
  tcp {
    port => 5000
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "postgresql"
    }
  }
  
  # TCP input for database metrics (MySQL)
  tcp {
    port => 5001
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "mysql"
    }
  }
  
  # TCP input for database metrics (MongoDB)
  tcp {
    port => 5002
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "mongodb"
    }
  }
  
  # TCP input for cost optimizer logs
  tcp {
    port => 5003
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "cost-optimizer"
    }
  }
  
  # TCP input for backup service logs
  tcp {
    port => 5004
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "backup"
    }
  }
  
  # TCP input for monitoring service logs
  tcp {
    port => 5005
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "monitoring"
    }
  }
  
  # TCP input for compliance service logs
  tcp {
    port => 5006
    codec => json
    add_field => { 
      "[@metadata][input_type]" => "tcp"
      "[@metadata][service]" => "compliance"
    }
  }
}
