# Logstash Output Configuration for DBCostOps
# Purpose: Define destinations for processed log data
# Author: DBCostOps Team
# Version: 2.0

output {
  # =============================================================================
  # ELASTICSEARCH OUTPUT
  # =============================================================================
  
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
    document_type => "%{[@metadata][document_type]}"
    
    # Template configuration
    template_name => "dbcostops"
    template => "/usr/share/logstash/templates/dbcostops.json"
    template_overwrite => true
    
    # Performance settings
    flush_size => 500
    idle_flush_time => 1
    
    # Retry configuration
    retry_on_conflict => 3
    retry_max_interval => 5
    
    # Connection settings
    pool_max => 10
    pool_max_per_route => 2
    
    # Authentication (disabled for development)
    user => ""
    password => ""
  }
  
  # =============================================================================
  # DEBUG OUTPUT
  # =============================================================================
  
  # Debug output for troubleshooting
  if "debug" in [tags] or [@metadata][debug] == "true" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
  
  # =============================================================================
  # ERROR HANDLING OUTPUT
  # =============================================================================
  
  # Send failed events to a separate index
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "dbcostops_errors-%{+YYYY.MM.dd}"
      document_type => "error_log"
    }
    
    # Also output to stderr for immediate visibility
    stderr {
      codec => rubydebug
    }
  }
}
