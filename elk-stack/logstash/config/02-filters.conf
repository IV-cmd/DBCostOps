# Logstash Filter Configuration for DBCostOps
# Purpose: Process and transform incoming log data
# Author: DBCostOps Team
# Version: 2.0

filter {
  # =============================================================================
  # COMMON PROCESSING
  # =============================================================================
  
  # Parse JSON messages for all TCP inputs
  if [@metadata][input_type] == "tcp" {
    json {
      source => "message"
    }
  }
  
  # Standardize timestamp field
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "epoch_millis" ]
    }
  } else {
    date {
      match => [ "@timestamp", "ISO8601" ]
    }
  }
  
  # Add common metadata fields
  mutate {
    add_field => { 
      "environment" => "development" 
      "cluster" => "dbcostops-cluster"
      "processed_at" => "%{+yyyy-MM-dd'T'HH:mm:ss.SSSZ}"
    }
  }
  
  # =============================================================================
  # SERVICE-SPECIFIC PROCESSING
  # =============================================================================
  
  # Database metrics processing
  if [@metadata][service] in ["postgresql", "mysql", "mongodb"] {
    mutate {
      add_field => { 
        "[@metadata][index]" => "dbcostops_metrics" 
        "[@metadata][document_type]" => "cost_metric" 
      }
    }
    
    # Validate numeric fields
    if [metric_value] {
      mutate {
        convert => { "metric_value" => "float" }
      }
    }
    
    if [cost_impact] {
      mutate {
        convert => { "cost_impact" => "float" }
      }
    }
  }
  
  # Cost optimizer logs processing
  if [@metadata][service] == "cost-optimizer" {
    mutate {
      add_field => { 
        "[@metadata][index]" => "dbcostops_optimization" 
        "[@metadata][document_type]" => "optimization_log" 
      }
    }
    
    # Extract recommendation priority
    if [priority] and [priority] !~ /^(low|medium|high)$/ {
      mutate {
        replace => { "priority" => "medium" }
      }
    }
  }
  
  # Backup logs processing
  if [@metadata][service] == "backup" {
    mutate {
      add_field => { 
        "[@metadata][index]" => "dbcostops_backup" 
        "[@metadata][document_type]" => "backup_log" 
      }
    }
    
    # Convert backup size to MB if needed
    if [backup_size_bytes] and ![backup_size_mb] {
      ruby {
        code => "event.set('backup_size_mb', event.get('backup_size_bytes').to_f / 1048576)"
      }
    }
  }
  
  # Monitoring logs processing
  if [@metadata][service] == "monitoring" {
    mutate {
      add_field => { 
        "[@metadata][index]" => "dbcostops_monitoring" 
        "[@metadata][document_type]" => "monitoring_log" 
      }
    }
    
    # Validate resource usage percentages
    if [cpu_usage] {
      mutate {
        convert => { "cpu_usage" => "float" }
      }
      if [cpu_usage] < 0 or [cpu_usage] > 100 {
        mutate {
          replace => { "cpu_usage" => 0 }
        }
      }
    }
  }
  
  # Compliance logs processing
  if [@metadata][service] == "compliance" {
    mutate {
      add_field => { 
        "[@metadata][index]" => "dbcostops_compliance" 
        "[@metadata][document_type]" => "compliance_log" 
      }
    }
    
    # Validate compliance score
    if [compliance_score] {
      mutate {
        convert => { "compliance_score" => "float" }
      }
      if [compliance_score] < 0 or [compliance_score] > 100 {
        mutate {
          replace => { "compliance_score" => 0 }
        }
      }
    }
  }
  
  # =============================================================================
  # DATA CLEANUP
  # =============================================================================
  
  # Remove unnecessary fields to reduce storage
  mutate {
    remove_field => [ 
      "host", 
      "agent", 
      "ecs", 
      "input", 
      "log",
      "message"
    ]
  }
  
  # Add tags for debugging
  if [@metadata][debug] == "true" {
    mutate {
      add_tag => [ "debug" ]
    }
  }
}
