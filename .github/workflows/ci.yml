name: CI Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Puppet syntax
        run: |
          find puppet/ -name "*.pp" -exec puppet parser validate {} \;

      - name: Validate Hiera syntax
        run: |
          find hieradata/ -name "*.yaml" -exec yamllint {} \;

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test database modules
        run: |
          puppet apply --test --modulepath=puppet/modules --execute "
            include dbcostops::postgresql::management
            include dbcostops::mysql::management
            include dbcostops::mongodb::management
          "
