name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          puppet apply --environment=production --modulepath=puppet/modules manifests/01-site.pp

      - name: Validate deployment
        run: |
          systemctl is-active dbcostops || exit 1
          curl -f http://localhost:8000/health || exit 1
